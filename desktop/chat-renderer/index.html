<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat - Pet Asistente</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #1a1a2e;
  color: #eee;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}
.header {
  background: #16213e;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid #0f3460;
  -webkit-app-region: drag;
}
.header h1 { font-size: 14px; font-weight: 600; flex: 1; }
.header span { font-size: 20px; }
.close-btn {
  -webkit-app-region: no-drag;
  background: none; border: none; color: #888; font-size: 18px; cursor: pointer;
  padding: 2px 8px; border-radius: 4px;
}
.close-btn:hover { background: #ff4444; color: #fff; }
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.msg {
  max-width: 85%;
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 13px;
  line-height: 1.4;
  animation: fadeIn 0.3s;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.msg.user {
  align-self: flex-end;
  background: #0f3460;
  border-bottom-right-radius: 4px;
}
.msg.pet {
  align-self: flex-start;
  background: #16213e;
  border-bottom-left-radius: 4px;
}
.msg .time {
  font-size: 10px;
  color: #666;
  margin-top: 4px;
  text-align: right;
}
.typing {
  align-self: flex-start;
  color: #888;
  font-size: 13px;
  padding: 4px 0;
}
.input-area {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  background: #16213e;
  border-top: 1px solid #0f3460;
}
.input-area input {
  flex: 1;
  background: #0f3460;
  border: 1px solid #1a3a6e;
  border-radius: 20px;
  padding: 10px 16px;
  color: #eee;
  font-size: 13px;
  outline: none;
}
.input-area input:focus { border-color: #536dfe; }
.input-area button {
  background: #536dfe;
  border: none;
  color: #fff;
  border-radius: 20px;
  padding: 8px 18px;
  font-size: 13px;
  cursor: pointer;
  transition: background 0.2s;
}
.input-area button:hover { background: #3d5afe; }
.input-area button:disabled { background: #333; color: #666; cursor: default; }
.status {
  text-align: center;
  padding: 4px;
  font-size: 11px;
  color: #666;
}
</style>
</head>
<body>
<div class="header">
  <span>🐾</span>
  <h1>Pet Asistente</h1>
  <button class="close-btn" onclick="window.close()">✕</button>
</div>
<div id="messages" class="messages">
  <div class="msg pet">¡Hola! Soy tu mascota virtual. Pregúntame lo que quieras 🐶</div>
</div>
<div class="status" id="status">Conectando...</div>
<div class="input-area">
  <input id="input" type="text" placeholder="Escribe algo..." autofocus>
  <button id="sendBtn" onclick="sendMessage()">Enviar</button>
</div>

<script>
const messagesEl = document.getElementById('messages')
const inputEl = document.getElementById('input')
const sendBtn = document.getElementById('sendBtn')
const statusEl = document.getElementById('status')
let loading = false
let gConfig = { aiMode: 'local', deepseekToken: '', assistantName: 'Pet' }

// Load config from Electron
async function loadConfig() {
  try {
    if (window.pet?.getConfig) {
      const cfg = await window.pet.getConfig()
      if (cfg) gConfig = cfg
    }
  } catch {}
  // Update header with name
  const nameEl = document.querySelector('.header h1')
  if (nameEl) nameEl.textContent = gConfig.assistantName || 'Pet Asistente'
}

// Check AI status
async function checkStatus() {
  try {
    const r = await fetch('http://127.0.0.1:8000/ai/status')
    const d = await r.json()
    const mode = gConfig.aiMode || 'local'
    if (mode === 'local') {
      statusEl.textContent = d.ollama_available ? '🟢 Ollama conectado' : '🔴 Ollama no disponible'
      statusEl.style.color = d.ollama_available ? '#4caf50' : '#ff5252'
    } else {
      statusEl.textContent = gConfig.deepseekToken ? '🟢 DeepSeek configurado' : '🟡 DeepSeek: falta token'
      statusEl.style.color = gConfig.deepseekToken ? '#4caf50' : '#ffc107'
    }
  } catch {
    statusEl.textContent = '🔴 Backend no disponible'
    statusEl.style.color = '#ff5252'
  }
}

loadConfig()
checkStatus()
setInterval(checkStatus, 10000)

function addMessage(text, isUser) {
  const div = document.createElement('div')
  div.className = `msg ${isUser ? 'user' : 'pet'}`
  div.innerHTML = text
  const time = document.createElement('div')
  time.className = 'time'
  time.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
  div.appendChild(time)
  messagesEl.appendChild(div)
  messagesEl.scrollTop = messagesEl.scrollHeight
}

async function sendMessage() {
  const text = inputEl.value.trim()
  if (!text || loading) return

  inputEl.value = ''
  addMessage(text, true)
  loading = true
  sendBtn.disabled = true

  const typing = document.createElement('div')
  typing.className = 'typing'
  typing.textContent = '🐾 Pensando...'
  messagesEl.appendChild(typing)
  messagesEl.scrollTop = messagesEl.scrollHeight

  try {
    const r = await fetch('http://127.0.0.1:8000/ai/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
        message: text,
        mode: gConfig.aiMode || 'local',
        api_token: gConfig.deepseekToken || '',
      }),
    })
    const d = await r.json()
    typing.remove()
    addMessage(d?.response || '... 😶', false)
  } catch {
    typing.remove()
    addMessage('No pude pensar 😅 Revisa que Ollama esté corriendo.', false)
  }

  loading = false
  sendBtn.disabled = false
  inputEl.focus()
}

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendMessage()
})

// Focus input on load
setTimeout(() => inputEl.focus(), 300)
</script>
</body>
</html>
