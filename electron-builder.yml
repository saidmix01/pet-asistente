appId: com.saidmix.pet-asistente
productName: Pet Asistente
copyright: Copyright © 2026 Said Avendaño

directories:
  output: release
  buildResources: desktop/assets

extraResources:
  - from: backend/dist/
    to: backend/
    filter:
      - "**/*"

  - from: desktop/assets
    to: assets

files:
  - desktop/electron/**/*
  - desktop/renderer/dist/**/*
  - desktop/chat-renderer/**/*
  - desktop/assets/**/*
  - desktop/package.json

# ── Windows ────────────────────────────────────────────────
win:
  target:
    - portable  # .exe portátil (no necesita instalación)
    - nsis      # instalador
  icon: desktop/assets/icon.png
  artifactName: ${productName}-${version}-${arch}.${ext}

# ── macOS ─────────────────────────────────────────────────
mac:
  target:
    - dmg
    - zip
  icon: desktop/assets/icon.png
  category: public.app-category.productivity
  artifactName: ${productName}-${version}-${arch}.${ext}

# ── Linux ─────────────────────────────────────────────────
linux:
  target:
    - AppImage
    - deb
  icon: desktop/assets/icon.png
  category: Utility
  artifactName: ${productName}-${version}-${arch}.${ext}
