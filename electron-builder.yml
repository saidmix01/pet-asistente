appId: com.saidmix.pet-asistente
productName: Pet Asistente
copyright: Copyright © 2026 Said Avendaño

directories:
  output: release
  buildResources: desktop/assets
  app: desktop

extraResources:
  - from: backend/dist/
    to: backend/
    filter:
      - "**/*"

files:
  - electron/**/*
  - renderer/dist/**/*
  - chat-renderer/**/*
  - config-renderer/**/*
  - assets/**/*
  - package.json

# ── Windows ────────────────────────────────────────────────
win:
  target:
    - portable
    - nsis
  icon: assets/icon.png
  artifactName: ${productName}-${version}-${arch}.${ext}

# ── macOS ─────────────────────────────────────────────────
mac:
  target:
    - dmg
    - zip
  icon: assets/icon.png
  category: public.app-category.productivity
  artifactName: ${productName}-${version}-${arch}.${ext}

# ── Linux ─────────────────────────────────────────────────
linux:
  target:
    - AppImage
  icon: assets/icon.png
  category: Utility
  artifactName: ${productName}-${version}-${arch}.${ext}
